name: ci
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install test deps
        run: pip install pytest jsonschema
      - name: Compile check
        run: python -m py_compile skill/geo-data-discovery/scripts/discovery_orchestrator.py examples/test_etna_pipeline.py
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Validate example JSON-LD against schema
        run: |
          python - <<'PY'
          import json, glob, jsonschema
          schema = json.load(open("schemas/discovery_output.schema.json"))
          for f in glob.glob("examples/*.jsonld"):
              jsonschema.validate(json.load(open(f)), schema)
              print("valid:", f)
          PY
